name: CI

on:
  push:
  pull_request:

jobs:
  build-and-validate:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Validate resources
        working-directory: app
        run: python3 scripts/validate_resources.py

      - name: Build app
        working-directory: app
        run: swift build
